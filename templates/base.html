<!DOCTYPE html>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<html>
    <head>
        <title>Bank of Flask</title>
    </head>
    <body>
        <nav>
            <ul class="nav nav-tabs ">
                <li class="nav-link"><a href="{{ url_for('home') }}">Home</a></li>
                <li class="nav-link"><a href="{{ url_for('transfer') }}">Make Transfer</a></li>
                <li class="nav-link"><a href="{{ url_for('accounts')}}">Accounts</a></li>
            </ul>
            
        </nav>
        
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <ul class="flashes alert alert-primary">
                {% for message in messages %}
                <h4>{{ message }}</h4>
                {% endfor %}
                </ul>
            {% endif %}
        {% endwith %}

        {% block content %}
        {% endblock %}
    </body>
</html>
