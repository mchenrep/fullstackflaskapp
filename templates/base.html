<!DOCTYPE html>
<html>
    <head>
        <title>Asynchronous Banking Transaction System Showcase</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body>
        <nav>
            <ul class="nav nav-tabs">
                <li class="text-reset text-decoration-none nav-item"><a class="nav-link" href="{{ url_for('home') }}">Home</a></li>
                <li class="text-reset text-decoration-none nav-item"><a class="nav-link" href="{{ url_for('transfer') }}">Make Transfer</a></li>
                <li class="text-reset text-decoration-none nav-item"><a class="nav-link" href="{{ url_for('accounts')}}">Accounts</a></li>
            </ul>
            
        </nav>
        
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-primary">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
            
        <div class="container mt-4">
            {% block content %}
            {% endblock %}
        </div>
    </body>
    <footer class="text-center mt-5 mb-3 text-muted">
        Flask • SQLite • Bootstrap 5 • Multithreaded Worker Queue
    </footer>
</html>
